<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-DOS Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-screen">
        <div class="scanlines"></div>
        
        <div class="terminal" id="terminal">
            <div id="output">
                C:\>REM Bienvenido a MS-DOS v6.22 (CRT Edition)<br>
                C:\>REM Escribe 'HELP' para ver los comandos disponibles.<br><br>
            </div>
            <div class="input-line" id="prompt-container">
                <span id="prompt">C:\></span>
                <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
